services:
  postgres:
    image: postgres:16
    container_name: sage-postgres
    environment:
      POSTGRES_DB: sageacademy
      POSTGRES_USER: sage
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data:
